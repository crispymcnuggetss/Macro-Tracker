    /* 1. Define the base (light) theme first */
    :root {
      --cream: #f6f6f6;       /* Clean, light neutral background */

      --ink: #212529;         /* Dark text */
      --ink-soft: #495057;
      --ink-mute: #adb5bd;
      --green: #2b8a3e;       /* Fresh green */
      --green-soft: #40c057;
      --terra: #e03131;       /* Clean accent */
      --terra-soft: #ff6b6b;
      --line: #dee2e6;        /* Subtle borders */
      --card: #ffffff;        /* Pure white cards */
      transition: background 0.3s, color 0.3s;
    }

    /* 2. Define the dark theme overrides below it */
    [data-theme="dark"] {
      --cream: #121212;
      --cream-2: #1e1e1e;
      --ink: #e0e0e0;
      --ink-soft: #b0b0b0;
      --ink-mute: #777777;
      --green: #51cf66;
      --green-soft: #40c057;
      --terra: #ff8787;
      --terra-soft: #ffa8a8;
      --line: #333333;
      --card: #1e1e1e;
    }

    /* 3. Base styles */
    body { 
      margin: 0; 
      padding: 0; 
      background: var(--cream); 
      color: var(--ink); 
      display: flex; 
      justify-content: center; 
    }
    #root { width: 100%; max-width: 480px; }
  </style>

    const parseOpt = v => { if (v === '' || v == null) return null; const n = parseFloat(v); return isNaN(n) ? null : n; };

    const sumKey = (entries, key) => { let total = 0; for (const e of entries) { const v = e.nutrients?.[key]; if (v != null) total += v; } return Math.round(total * 10) / 10; };

          </div>
          <div className="mt-input-row">
            <div className="mt-field"><label className="mt-field-label">Weight ({isImperial?'lb':'kg'})</label><input className="mt-input" type="number" step="any" value={displayWeight} onChange={e=>setWeight(e.target.value)}/></div>
            <div className="mt-field"><label className="mt-field-label">Target ({isImperial?'lb':'kg'})</label><input className="mt-input" type="number" step="any" value={displayTarget} onChange={e=>setTarget(e.target.value)}/></div>
          </div>
          <div className="mt-field">
            <label className="mt-field-label">Activity</label>
            <select className="mt-select" value={profile.activity} onChange={e=>setProfile({...profile,activity:e.target.value})}>
              {ACTIVITY_LEVELS.map(a=><option key={a.key} value={a.key}>{a.label} — {a.desc}</option>)}
            </select>
          </div>
        </>
      );
    };

    // ---------- Main App (with all fixes) ----------
    const MainApp = ({ user, onLogout }) => {
      const [tab, setTab] = React.useState('today');
      const [foods, setFoods] = React.useState([]);
      const [entries, setEntries] = React.useState([]);
      const [goals, setGoals] = React.useState({ cal: 2000, protein: 150 });
      const [profile, setProfile] = React.useState(null);
      const [waterEntries, setWaterEntries] = React.useState([]);
      const [sleepEntries, setSleepEntries] = React.useState([]);
      const [waterGoal, setWaterGoal] = React.useState(2500);
      const [sleepGoal, setSleepGoal] = React.useState(8);
      const [loading, setLoading] = React.useState(true);
      const [saveError, setSaveError] = React.useState(false);
      const [onboarded, setOnboarded] = React.useState(false);
      const [darkMode, setDarkMode] = React.useState(false);

      const [expandedEntry, setExpandedEntry] = React.useState(null);
      const [showAdd, setShowAdd] = React.useState(false);
      const [showLibAdd, setShowLibAdd] = React.useState(false);
      const [showMealBuilder, setShowMealBuilder] = React.useState(false);
      const [showServing, setShowServing] = React.useState(null);
      const [editingFood, setEditingFood] = React.useState(null);
      const [libSearch, setLibSearch] = React.useState('');
      const [dirtyForm, setDirtyForm] = React.useState(false);

      React.useEffect(() => {
        const load = async () => {
          try {
            const doc = await db.collection('users').doc(user.uid).get();
            if (doc.exists) {
              const d = doc.data();
              if (d.foods) setFoods(d.foods); else setFoods(SEED_LIBRARY);
              if (d.entries) setEntries(d.entries);
              if (d.goals) setGoals(d.goals);
              if (d.profile) { setProfile(d.profile); setOnboarded(true); }
              else setProfile(null);
              if (d.waterEntries) setWaterEntries(d.waterEntries);
              if (d.sleepEntries) setSleepEntries(d.sleepEntries);
              if (d.waterGoal) setWaterGoal(d.waterGoal);
              if (d.sleepGoal) setSleepGoal(d.sleepGoal);
              if (d.darkMode !== undefined) setDarkMode(d.darkMode);
              if (d.onboarded !== undefined) setOnboarded(d.onboarded);
            } else {
              setFoods(SEED_LIBRARY);
              setProfile(null);
            }
          } catch (e) { setSaveError(true); setFoods(SEED_LIBRARY); }
          setLoading(false);
        };
        load();
      }, [user.uid]);

      React.useEffect(() => {
        if (loading) return;
        const save = async () => {
          try {
            const data = { foods, entries, goals, waterEntries, sleepEntries, waterGoal, sleepGoal, darkMode, onboarded };
            if (profile) data.profile = profile;
            await db.collection('users').doc(user.uid).set(data, { merge: true });
            setSaveError(false);
          } catch (e) { setSaveError(true); }
        };
        save();
      }, [foods, entries, goals, waterEntries, sleepEntries, waterGoal, sleepGoal, darkMode, onboarded, profile, user.uid, loading]);

      React.useEffect(() => {
        document.documentElement.setAttribute('data-theme', darkMode ? 'dark' : '');
      }, [darkMode]);

      const today = todayKey();
      const todayFoods = entries.filter(e => e.date === today);
      const totals = {};
      for (const f of NUTRIENT_FIELDS) totals[f.key] = sumKey(todayFoods, f.key);
      const todayWater = waterEntries.find(w => w.date === today)?.amount || 0;
      const todaySleep = sleepEntries.find(s => s.date === today)?.hours || 0;
      const calPct = goals.cal ? totals.cal / goals.cal : 0;

      const removeEntry = id => setEntries(entries.filter(e => e.id !== id));
      const addEntry = entry => setEntries([...entries, { ...entry, id: Date.now().toString(), date: today }]);
      const deleteFood = id => setFoods(foods.filter(f => f.id !== id));
      const logWater = amount => {
        const existing = waterEntries.find(w => w.date === today);
        if (existing) setWaterEntries(waterEntries.map(w => w.date===today ? {...w, amount} : w));
        else setWaterEntries([...waterEntries, { id: Date.now().toString(), date: today, amount }]);
      };
      const logSleep = hours => {
        const existing = sleepEntries.find(s => s.date === today);
        if (existing) setSleepEntries(sleepEntries.map(s => s.date===today ? {...s, hours} : s));
        else setSleepEntries([...sleepEntries, { id: Date.now().toString(), date: today, hours }]);
      };

      const recommendWater = profile?.weightKg ? Math.round(profile.weightKg * 35) : 2500;
      const recommendSleep = 8;
      const advice = [];
      if (goals.cal && totals.cal > goals.cal * 1.1) advice.push('Calories are above your daily goal. Consider lighter meals.');
      if (goals.cal && totals.cal < goals.cal * 0.9) advice.push('Calories are below your goal. Try adding a nutrient-dense snack.');
      if (goals.protein && totals.protein < goals.protein) advice.push('Protein is lower than target. Include a protein source with your next meal.');
      if (todayWater < (waterGoal || recommendWater)) advice.push(`Water intake is low. Aim for ${waterGoal || recommendWater}ml today.`);
      if (todaySleep < (sleepGoal || recommendSleep)) advice.push(`You slept less than ${sleepGoal || recommendSleep}h. Try to get more rest tonight.`);
      if (advice.length === 0) advice.push('You’re on track! Keep up the good work.');

      const handleOnboardingComplete = (prof) => {
        setProfile(prof);
        setOnboarded(true);
        setWaterGoal(Math.round(prof.weightKg * 35));
        setSleepGoal(8);
        db.collection('users').doc(user.uid).set({profile: prof, onboarded: true}, {merge: true});
      };

      if (loading) return <div style={{padding:40,textAlign:'center',color:'var(--ink-soft)'}}>Loading…</div>;

      if (!onboarded || !profile) {
        return (
          <div className="mt-root">
            <style>{css}</style>
            <OnboardingWizard onComplete={handleOnboardingComplete} />
          </div>
        );
      }

      return (
        <div className="mt-root">
          <style>{css}</style>
          <div className="mt-header" style={{display:'flex', justifyContent:'space-between', alignItems:'center'}}>
            <div>
              <h1 className="mt-title" style={{fontSize:22}}>
                {tab === 'today' ? 'Today' : tab === 'library' ? 'Library' : tab === 'history' ? 'History' : tab === 'goals' ? 'Goals' : 'Settings'}
              </h1>
              <p className="mt-sub">{user.email}</p>
            </div>
          </div>

          {tab === 'today' && (
            <TodayView totals={totals} goals={goals} calPct={calPct} entries={todayFoods}
              expandedEntry={expandedEntry} setExpandedEntry={setExpandedEntry}
              removeEntry={removeEntry} saveError={saveError} water={todayWater} waterGoal={waterGoal||recommendWater}
              sleep={todaySleep} sleepGoal={sleepGoal||recommendSleep} advice={advice} logWater={logWater} logSleep={logSleep} />
          )}
          {tab === 'library' && (
            <LibraryView foods={foods} setShowLibAdd={setShowLibAdd} setShowMealBuilder={setShowMealBuilder}
              setShowServing={setShowServing} setEditingFood={setEditingFood}
              deleteFood={deleteFood} libSearch={libSearch} setLibSearch={setLibSearch} />
          )}
          {tab === 'history' && <HistoryView entries={entries} goals={goals} />}
          {tab === 'goals' && (
            <GoalsView goals={goals} setGoals={setGoals} profile={profile}
              waterGoal={waterGoal} setWaterGoal={setWaterGoal} sleepGoal={sleepGoal} setSleepGoal={setSleepGoal} />
          )}
          {tab === 'settings' && (
            <SettingsView user={user} profile={profile} setProfile={setProfile} darkMode={darkMode} setDarkMode={setDarkMode} onLogout={onLogout} />
          )}

          {tab === 'today' && (
            <button className="mt-add-fab" onClick={() => setShowAdd(true)}><Icons.Plus size={18} /> Log food</button>
          )}
          {tab === 'library' && (
            <button className="mt-add-fab" onClick={() => setShowMealBuilder(true)}><Icons.Plus size={18} /> Create Meal</button>
          )}

          <nav className="mt-nav">
            <button className={`mt-nav-btn ${tab==='today'?'active':''}`} onClick={()=>setTab('today')}><Icons.Calendar size={20}/>Today</button>
            <button className={`mt-nav-btn ${tab==='library'?'active':''}`} onClick={()=>setTab('library')}><Icons.Library size={20}/>Library</button>
            <button className={`mt-nav-btn ${tab==='history'?'active':''}`} onClick={()=>setTab('history')}><Icons.Calendar size={20}/>History</button>
            <button className={`mt-nav-btn ${tab==='goals'?'active':''}`} onClick={()=>setTab('goals')}><Icons.Target size={20}/>Goals</button>
            <button className={`mt-nav-btn ${tab==='settings'?'active':''}`} onClick={()=>setTab('settings')}><Icons.Settings size={20}/>Settings</button>
          </nav>

          {showAdd && (
            <AddEntrySheet foods={foods} onClose={()=>{setShowAdd(false);setDirtyForm(false);}}
              onSetDirty={setDirtyForm} dirtyForm={dirtyForm}
              onAddEntry={(e)=>{addEntry(e);setShowAdd(false);setDirtyForm(false);}}
              onPickFood={(f)=>{setShowServing(f);setShowAdd(false);}} />
          )}
          {showServing && (
            <ServingSheet food={showServing} onClose={()=>setShowServing(null)}
              onLog={(e)=>{addEntry(e);setShowServing(null);}} />
          )}
          {showLibAdd && (
            <FoodEditorSheet onClose={()=>{setShowLibAdd(false);setDirtyForm(false);}}
              onSetDirty={setDirtyForm} dirtyForm={dirtyForm}
              onSave={(f)=>{setFoods([...foods,{...f,id:Date.now().toString()}]);setShowLibAdd(false);setDirtyForm(false);}} />
          )}
          {editingFood && (
            <FoodEditorSheet existing={editingFood} onClose={()=>{setEditingFood(null);setDirtyForm(false);}}
              onSetDirty={setDirtyForm} dirtyForm={dirtyForm}
              onSave={(f)=>{setFoods(foods.map(x=>x.id===editingFood.id?{...x,...f}:x));setEditingFood(null);setDirtyForm(false);}} />
          )}
          {showMealBuilder && (
            <MealBuilderSheet foods={foods} onClose={()=>{setShowMealBuilder(false);setDirtyForm(false);}}
              onSetDirty={setDirtyForm} dirtyForm={dirtyForm}
              onSave={(meal)=>{setFoods([...foods,{...meal,id:Date.now().toString()}]);setShowMealBuilder(false);setDirtyForm(false);}} />
          )}
        </div>
      );
    };

    // ---------- TodayView (with water/sleep quick add) ----------
    const TodayView = ({ totals, goals, calPct, entries, expandedEntry, setExpandedEntry, removeEntry, saveError, water, waterGoal, sleep, sleepGoal, advice, logWater, logSleep }) => {
      const proteinPct = goals.protein ? Math.min(totals.protein / goals.protein, 1) : 0;
      return (
        <>
          <div className="mt-ring-wrap">
            <div className="mt-ring-box">
              <div className="mt-ring-row">
                <Ring pct={calPct} />
                <div className="mt-ring-info">
                  <div className="mt-ring-label">Calories</div>
                  <div className="mt-ring-val">{fmtInt(totals.cal)}</div>
                  <div className="mt-ring-goal">of {goals.cal || '—'}</div>
                </div>
              </div>
              <div className="mt-ring-bar-row">
                <div className="mt-ring-bar mt-bar-protein">
                  <div className="mt-bar-label">Protein</div>
                  <div className="mt-bar-val">{totals.protein}g / {goals.protein || '—'}</div>
                  <div className="mt-bar-track"><div className="mt-bar-fill" style={{width:`${proteinPct*100}%`}}/></div>
                </div>
                <div className="mt-ring-bar mt-bar-carbs">
                  <div className="mt-bar-label">Carbs</div>
                  <div className="mt-bar-val">{totals.carbs}g</div>
                  <div className="mt-bar-track"><div className="mt-bar-fill" style={{width:'100%',opacity:0.6}}/></div>
                </div>
                <div className="mt-ring-bar mt-bar-fat">
                  <div className="mt-bar-label">Fat</div>
                  <div className="mt-bar-val">{totals.fat}g</div>
                  <div className="mt-bar-track"><div className="mt-bar-fill" style={{width:'100%',opacity:0.6}}/></div>
                </div>
              </div>
              <div className="mt-ring-bar-row" style={{marginTop:12, flexWrap:'wrap'}}>
                <div className="mt-ring-bar" style={{minWidth:80}}>
                  <div className="mt-bar-label">Water</div>
                  <div className="mt-bar-val">{water}ml / {waterGoal}ml</div>
                  <div className="mt-bar-track"><div className="mt-bar-fill" style={{width:`${Math.min(water/waterGoal*100,100)}%`, background:'#5a9ec2'}}/></div>
                  <div style={{display:'flex', gap:4, marginTop:4}}>
                    <button className="mt-btn-ghost" onClick={()=>logWater((water||0)+250)}>+250</button>
                    <button className="mt-btn-ghost" onClick={()=>logWater((water||0)+500)}>+500</button>
                  </div>
                </div>
                <div className="mt-ring-bar" style={{minWidth:80}}>
                  <div className="mt-bar-label">Sleep</div>
                  <div className="mt-bar-val">{sleep}h / {sleepGoal}h</div>
                  <div className="mt-bar-track"><div className="mt-bar-fill" style={{width:`${Math.min(sleep/sleepGoal*100,100)}%`, background:'#7e6b8f'}}/></div>
                  <div style={{display:'flex', gap:4, marginTop:4}}>
                    <button className="mt-btn-ghost" onClick={()=>logSleep((sleep||0)+0.5)}>+0.5h</button>
                    <button className="mt-btn-ghost" onClick={()=>logSleep((sleep||0)+1)}>+1h</button>
                  </div>
                </div>
              </div>
            </div>
          </div>
          <section className="mt-section">
            {saveError && <div className="mt-notice">⚠️ Could not save to cloud.</div>}
            <div className="mt-section-head">
              <h2 className="mt-section-title">Logged</h2>
              <span className="mt-section-count">{entries.length} {entries.length===1?'item':'items'}</span>
            </div>
            {entries.length===0 ? <div className="mt-empty">Nothing logged yet today.</div> : entries.map(e=>(
              <div key={e.id} className="mt-entry">
                <div className="mt-entry-head" onClick={()=>setExpandedEntry(expandedEntry===e.id?null:e.id)}>
                  {expandedEntry===e.id ? <Icons.ChevronDown size={14}/> : <Icons.ChevronRight size={14}/>}
                  <div className="mt-entry-info">
                    <p className="mt-entry-name">{e.name}</p>
                    <p className="mt-entry-meta">{e.servingNote} · {e.nutrients.protein != null ? `${e.nutrients.protein}g p` : '—'}</p>
                  </div>
                  <span className="mt-entry-cal">{fmtInt(e.nutrients.cal)}</span>
                  <button className="mt-entry-x" onClick={ev=>{ev.stopPropagation();removeEntry(e.id)}}><Icons.X size={16}/></button>
                </div>
                {expandedEntry===e.id && (
                  <div className="mt-entry-expand">
                    {NUTRIENT_FIELDS.map(f=>(
                      <div key={f.key} className="mt-entry-stat">
                        <span className="mt-entry-stat-l">{f.label}</span>
                        <span className="mt-entry-stat-v">{fmt(e.nutrients[f.key], f.unit)}</span>
                      </div>
                    ))}
                  </div>
                )}
              </div>
            ))}
            <div className="mt-advice">
              <h3 className="mt-advice-title">Daily Tips</h3>
              {advice.map((tip,i)=><p key={i} className="mt-advice-item">💡 {tip}</p>)}
            </div>
          </section>
        </>
      );
    };

    // ---------- LibraryView (consistent buttons) ----------
    const LibraryView = ({ foods, setShowLibAdd, setShowMealBuilder, setShowServing, setEditingFood, deleteFood, libSearch, setLibSearch }) => {
      const filtered = foods.filter(f=>f.name.toLowerCase().includes(libSearch.toLowerCase()));
      return (
        <section className="mt-section">
          <div className="mt-search">
            <Icons.Search className="mt-search-icon" size={16}/>
            <input className="mt-search-input" placeholder="Search foods…" value={libSearch} onChange={e=>setLibSearch(e.target.value)}/>
          </div>
          <div style={{display:'flex', gap:8, marginBottom:10}}>
            <button className="mt-btn-primary" onClick={()=>setShowLibAdd(true)} style={{flex:1}}>New Food</button>
            <button className="mt-btn-primary" onClick={()=>setShowMealBuilder(true)} style={{flex:1}}>Create Meal</button>
          </div>
          {filtered.length===0 ? <div className="mt-empty">No matches.</div> : filtered.map(f=>(
            <div key={f.id} className="mt-lib-item">
              <div className="mt-lib-info" onClick={()=>setShowServing(f)}>
                <p className="mt-lib-name">{f.name}</p>
                <p className="mt-lib-meta">{f.servingDesc} · {fmtInt(f.cal)} cal · {fmt(f.protein,'g')} p</p>
              </div>
              <button className="mt-lib-edit" onClick={()=>setEditingFood(f)}><Icons.Edit2 size={14}/></button>
              <button className="mt-lib-edit" onClick={()=>{if(confirm(`Delete ${f.name}?`))deleteFood(f.id)}}><Icons.Trash2 size={14}/></button>
            </div>
          ))}
        </section>
      );
    };

    // ---------- HistoryView ----------
    const HistoryView = ({ entries, goals }) => {
      const byDay = {};
      for (const e of entries) { if (!byDay[e.date]) byDay[e.date] = []; byDay[e.date].push(e); }
      const days = Object.keys(byDay).sort().reverse();
      return (
        <section className="mt-section">
          {days.length===0 ? <div className="mt-empty">No history yet.</div> : days.map(d=>{
            const dayEntries = byDay[d];
            const cal = sumKey(dayEntries,'cal');
            const protein = sumKey(dayEntries,'protein');
            return (
              <div key={d} className="mt-history-day">
                <h3 className="mt-history-date">{new Date(d+'T12:00:00').toLocaleDateString('en-US',{weekday:'short',month:'short',day:'numeric'})}</h3>
                <div className="mt-history-stats">
                  <span>{fmtInt(cal)} cal{goals.cal?`/ ${goals.cal}`:''}</span>
                  <span>{protein}g protein{goals.protein?`/ ${goals.protein}g`:''}</span>
                  <span>{dayEntries.length} items</span>
                </div>
              </div>
            );
          })}
        </section>
      );
    };

    // ---------- GoalsView (includes water/sleep goals) ----------
    const GoalsView = ({ goals, setGoals, profile, waterGoal, setWaterGoal, sleepGoal, setSleepGoal }) => {
      const bmr = calcBMR(profile);
      const tdee = calcTDEE(bmr, profile.activity);
      const deltaKg = profile.weightKg && profile.targetWeightKg ? profile.targetWeightKg - profile.weightKg : 0;
      const direction = deltaKg < -0.1 ? 'cut' : deltaKg > 0.1 ? 'bulk' : 'maintain';
      const proteinRecKg = profile.weightKg ? Math.round(profile.weightKg * 1.8) : null;
      const recommendWater = profile.weightKg ? Math.round(profile.weightKg * 35) : 2500;
      const recommendSleep = 8;
      const totalLbToChange = Math.abs(kgToLb(deltaKg));
      const paces = direction === 'cut' ? CUT_PACES : direction === 'bulk' ? BULK_PACES : [];
      const applyPace = (pace) => {
        const targetCal = direction==='cut' ? tdee-pace.deficit : tdee+pace.surplus;
        setGoals({...goals, cal: Math.round(targetCal), protein: proteinRecKg||goals.protein});
      };
      return (
        <section className="mt-section">
          <div className="mt-goal-card">
            <h3 className="mt-goal-card-title">Calories & Protein</h3>
            <div className="mt-goal-stat"><span>BMR</span><span>{bmr?Math.round(bmr)+' cal':'—'}</span></div>
            <div className="mt-goal-stat"><span>TDEE</span><span>{tdee?tdee+' cal':'—'}</span></div>
            <div className="mt-goal-stat"><span>Protein recommendation</span><span>{proteinRecKg?proteinRecKg+'g':'—'}</span></div>
            {direction!=='maintain' && tdee && (
              <>
                <div className="mt-goal-callout">You want to {direction==='cut'?'lose':'gain'} {totalLbToChange.toFixed(1)}lb ({Math.abs(deltaKg).toFixed(1)}kg).</div>
                {paces.map(p=>{
                  const dailyCal = direction==='cut'?tdee-p.deficit:tdee+p.surplus;
                  const weeks = Math.round(totalLbToChange/p.perWeekLb);
                  return (
                    <div key={p.key} className="mt-pace">
                      <div className="mt-pace-head"><span className="mt-pace-label">{p.label}</span><span>{p.perWeekLb}lb/wk</span></div>
                      <div className="mt-pace-stats">
                        <div><div className="mt-pace-stat-l">Daily cal</div><div className="mt-pace-stat-v">{Math.round(dailyCal)}</div></div>
                        <div><div className="mt-pace-stat-l">~weeks</div><div className="mt-pace-stat-v">{weeks}</div></div>
                      </div>
                      <button className="mt-pace-apply" onClick={()=>applyPace(p)}><Icons.Check size={12}/> Apply</button>
                    </div>
                  );
                })}
              </>
            )}
            <div className="mt-field" style={{marginTop:12}}>
              <label className="mt-field-label">Manual calorie goal</label>
              <input className="mt-input" type="number" value={goals.cal||''} onChange={e=>setGoals({...goals,cal:parseOpt(e.target.value)})}/>
            </div>
            <div className="mt-field">
              <label className="mt-field-label">Manual protein goal (g)</label>
              <input className="mt-input" type="number" value={goals.protein||''} onChange={e=>setGoals({...goals,protein:parseOpt(e.target.value)})}/>
            </div>
          </div>
          <div className="mt-goal-card">
            <h3 className="mt-goal-card-title">Water</h3>
            <div className="mt-goal-stat"><span>Recommended</span><span>{recommendWater} ml</span></div>
            <div className="mt-field">
              <label className="mt-field-label">Goal (ml)</label>
              <input className="mt-input" type="number" step="any" value={waterGoal} onChange={e=>setWaterGoal(parseFloat(e.target.value)||0)}/>
              <button className="mt-btn-ghost" onClick={()=>setWaterGoal(recommendWater)}>Apply recommendation</button>
            </div>
          </div>
          <div className="mt-goal-card">
            <h3 className="mt-goal-card-title">Sleep</h3>
            <div className="mt-goal-stat"><span>Recommended</span><span>{recommendSleep} h</span></div>
            <div className="mt-field">
              <label className="mt-field-label">Goal (hours)</label>
              <input className="mt-input" type="number" step="any" value={sleepGoal} onChange={e=>setSleepGoal(parseFloat(e.target.value)||0)}/>
              <button className="mt-btn-ghost" onClick={()=>setSleepGoal(recommendSleep)}>Apply recommendation</button>
            </div>
          </div>
        </section>
      );
    };

    // ---------- Sheets (all fully defined) ----------
    const AddEntrySheet = ({ foods, onClose, onAddEntry, onPickFood, onSetDirty, dirtyForm }) => {
      const [mode, setMode] = React.useState('library');
      const [search, setSearch] = React.useState('');
      const [name, setName] = React.useState('');
      const [servingNote, setServingNote] = React.useState('1 serving');
      const [vals, setVals] = React.useState({});
      const [showAdvanced, setShowAdvanced] = React.useState(false);
      const filtered = foods.filter(f=>f.name.toLowerCase().includes(search.toLowerCase()));
      const submit = () => {
        if (!name.trim()) return;
        const nutrients = {};
        for (const f of NUTRIENT_FIELDS) nutrients[f.key] = parseOpt(vals[f.key]);
        if (nutrients.cal == null) nutrients.cal = 0;
        onAddEntry({name: name.trim(), servingNote: servingNote||'1 serving', nutrients});
      };
      React.useEffect(() => {
        if (name || Object.values(vals).some(v=>v!=='')) onSetDirty(true);
        else onSetDirty(false);
      }, [name, vals]);
      return (
        <div className="mt-sheet-bg" onClick={()=> { if (!dirtyForm || confirm('Discard changes?')) onClose(); }}>
          <div className="mt-sheet" onClick={e=>e.stopPropagation()}>
            <div className="mt-sheet-head"><h2 className="mt-sheet-title">Log food</h2><button className="mt-sheet-x" onClick={onClose}><Icons.X size={20}/></button></div>
            <div className="mt-unit-toggle" style={{display:'flex',marginBottom:14}}>
              <button className={mode==='library'?'active':''} onClick={()=>setMode('library')} style={{flex:1}}>From library</button>
              <button className={mode==='manual'?'active':''} onClick={()=>setMode('manual')} style={{flex:1}}>Quick entry</button>
            </div>
            {mode==='library' && (
              <>
                <div className="mt-search"><Icons.Search className="mt-search-icon" size={16}/><input className="mt-search-input" placeholder="Search…" value={search} onChange={e=>setSearch(e.target.value)}/></div>
                <div style={{maxHeight:'50vh',overflowY:'auto'}}>
                  {filtered.length===0 ? <div className="mt-empty">No matches.</div> : filtered.map(f=>(
                    <div key={f.id} className="mt-lib-item" onClick={()=>onPickFood(f)} style={{cursor:'pointer'}}>
                      <div className="mt-lib-info"><p className="mt-lib-name">{f.name}</p><p className="mt-lib-meta">{f.servingDesc} · {fmtInt(f.cal)} cal</p></div>
                      <Icons.ChevronRight size={16}/>
                    </div>
                  ))}
                </div>
              </>
            )}
            {mode==='manual' && (
              <>
                <div className="mt-field"><label className="mt-field-label">Food name</label><input className="mt-input" value={name} onChange={e=>setName(e.target.value)} placeholder="e.g. Mom's lasagna"/></div>
                <div className="mt-field"><label className="mt-field-label">Serving note</label><input className="mt-input" value={servingNote} onChange={e=>setServingNote(e.target.value)} placeholder="e.g. 1 plate, 200g"/></div>
                <div className="mt-field-label">Macros</div>
                <div className="mt-input-row">
                  {NUTRIENT_FIELDS.slice(0,2).map(f=><div className="mt-field" key={f.key}><label className="mt-field-label">{f.label}{f.unit&&` (${f.unit})`}</label><input className="mt-input" type="number" step="any" inputMode="decimal" value={vals[f.key]||''} onChange={e=>setVals({...vals,[f.key]:e.target.value})}/></div>)}
                </div>
                <div className="mt-input-row">
                  {NUTRIENT_FIELDS.slice(2,4).map(f=><div className="mt-field" key={f.key}><label className="mt-field-label">{f.label}{f.unit&&` (${f.unit})`}</label><input className="mt-input" type="number" step="any" inputMode="decimal" value={vals[f.key]||''} onChange={e=>setVals({...vals,[f.key]:e.target.value})}/></div>)}
                </div>
                <button className="mt-btn-ghost" onClick={()=>setShowAdvanced(!showAdvanced)}>{showAdvanced?<Icons.ChevronDown size={14}/>:<Icons.ChevronRight size={14}/>}{showAdvanced?'Hide':'Show'} other nutrients</button>
                {showAdvanced && (
                  <>
                    <div className="mt-input-row">{NUTRIENT_FIELDS.slice(4,6).map(f=><div className="mt-field" key={f.key}><label className="mt-field-label">{f.label}{f.unit&&` (${f.unit})`}</label><input className="mt-input" type="number" step="any" inputMode="decimal" value={vals[f.key]||''} onChange={e=>setVals({...vals,[f.key]:e.target.value})}/></div>)}</div>
                    <div className="mt-input-row">{NUTRIENT_FIELDS.slice(6,8).map(f=><div className="mt-field" key={f.key}><label className="mt-field-label">{f.label}{f.unit&&` (${f.unit})`}</label><input className="mt-input" type="number" step="any" inputMode="decimal" value={vals[f.key]||''} onChange={e=>setVals({...vals,[f.key]:e.target.value})}/></div>)}</div>
                    <div className="mt-input-row">{NUTRIENT_FIELDS.slice(8,10).map(f=><div className="mt-field" key={f.key}><label className="mt-field-label">{f.label}{f.unit&&` (${f.unit})`}</label><input className="mt-input" type="number" step="any" inputMode="decimal" value={vals[f.key]||''} onChange={e=>setVals({...vals,[f.key]:e.target.value})}/></div>)}</div>
                  </>
                )}
                <button className="mt-btn-primary" onClick={submit} disabled={!name.trim()}>Log it</button>
              </>
            )}
          </div>
        </div>
      );
    };

    const ServingSheet = ({ food, onClose, onLog }) => {
      const [byGrams, setByGrams] = React.useState(false);
      const [servings, setServings] = React.useState(1);
      const [grams, setGrams] = React.useState(food.servingG);
      const mult = byGrams ? grams / food.servingG : servings;
      const scaled = scale(food, mult);
      const log = () => {
        const note = byGrams ? `${grams}g` : `${servings} × ${food.servingDesc}`;
        onLog({name: food.name, servingNote: note, nutrients: scaled});
      };
      return (
        <div className="mt-sheet-bg" onClick={onClose}><div className="mt-sheet" onClick={e=>e.stopPropagation()}>
          <div className="mt-sheet-head"><h2 className="mt-sheet-title">{food.name}</h2><button className="mt-sheet-x" onClick={onClose}><Icons.X size={20}/></button></div>
          <div className="mt-notice">Base: {food.servingDesc} ({food.servingG}g)</div>
          <div className="mt-unit-toggle" style={{display:'flex',marginBottom:14}}>
            <button className={!byGrams?'active':''} onClick={()=>setByGrams(false)} style={{flex:1}}>Servings</button>
            <button className={byGrams?'active':''} onClick={()=>setByGrams(true)} style={{flex:1}}>Grams</button>
          </div>
          <div className="mt-field">
            {byGrams ? (
              <><label className="mt-field-label">Grams</label><input className="mt-input" type="number" step="any" value={grams} onChange={e=>setGrams(parseFloat(e.target.value)||0)}/></>
            ) : (
              <><label className="mt-field-label">Servings</label><input className="mt-input" type="number" step="any" value={servings} onChange={e=>setServings(parseFloat(e.target.value)||0)}/></>
            )}
          </div>
          <div className="mt-goal-card" style={{margin:'14px 0'}}>
            {NUTRIENT_FIELDS.map(f=>(
              <div key={f.key} className="mt-goal-stat"><span>{f.label}</span><span>{fmt(scaled[f.key], f.unit)}</span></div>
            ))}
          </div>
          <button className="mt-btn-primary" onClick={log} disabled={mult<=0}>Log it</button>
        </div></div>
      );
    };

    const FoodEditorSheet = ({ existing, onClose, onSave, onSetDirty, dirtyForm }) => {
      const [name, setName] = React.useState(existing?.name||'');
      const [servingDesc, setServingDesc] = React.useState(existing?.servingDesc||'100g');
      const [servingG, setServingG] = React.useState(existing?.servingG||100);
      const [vals, setVals] = React.useState(()=>{ const v={}; for(const f of NUTRIENT_FIELDS){ const x=existing?.[f.key]; v[f.key]=x==null?'':String(x); } return v; });
      const [showAdvanced, setShowAdvanced] = React.useState(false);
      const save = () => {
        if (!name.trim()) return;
        const obj = { name: name.trim(), servingDesc: servingDesc||'1 serving', servingG: parseFloat(servingG)||100 };
        for (const f of NUTRIENT_FIELDS) obj[f.key] = parseOpt(vals[f.key]);
        if (obj.cal == null) obj.cal = 0;
        onSave(obj);
      };
      React.useEffect(() => {
        if (name || Object.values(vals).some(v=>v!=='')) onSetDirty(true);
        else onSetDirty(false);
      }, [name, vals]);
      return (
        <div className="mt-sheet-bg" onClick={()=> { if (!dirtyForm || confirm('Discard changes?')) onClose(); }}>
          <div className="mt-sheet" onClick={e=>e.stopPropagation()}>
            <div className="mt-sheet-head"><h2 className="mt-sheet-title">{existing?'Edit food':'New food'}</h2><button className="mt-sheet-x" onClick={onClose}><Icons.X size={20}/></button></div>
            <div className="mt-field"><label className="mt-field-label">Name</label><input className="mt-input" value={name} onChange={e=>setName(e.target.value)} placeholder="e.g. Greek yogurt"/></div>
            <div className="mt-input-row">
              <div className="mt-field"><label className="mt-field-label">Serving desc</label><input className="mt-input" value={servingDesc} onChange={e=>setServingDesc(e.target.value)}/></div>
              <div className="mt-field"><label className="mt-field-label">Grams</label><input className="mt-input" type="number" step="any" value={servingG} onChange={e=>setServingG(e.target.value)}/></div>
            </div>
            <div className="mt-field-label">Per serving</div>
            <div className="mt-input-row">
              {NUTRIENT_FIELDS.slice(0,2).map(f=><div className="mt-field" key={f.key}><label className="mt-field-label">{f.label}{f.unit&&` (${f.unit})`}</label><input className="mt-input" type="number" step="any" inputMode="decimal" value={vals[f.key]} onChange={e=>setVals({...vals,[f.key]:e.target.value})}/></div>)}
            </div>
            <div className="mt-input-row">
              {NUTRIENT_FIELDS.slice(2,4).map(f=><div className="mt-field" key={f.key}><label className="mt-field-label">{f.label}{f.unit&&` (${f.unit})`}</label><input className="mt-input" type="number" step="any" inputMode="decimal" value={vals[f.key]} onChange={e=>setVals({...vals,[f.key]:e.target.value})}/></div>)}
            </div>
            <button className="mt-btn-ghost" onClick={()=>setShowAdvanced(!showAdvanced)}>{showAdvanced?<Icons.ChevronDown size={14}/>:<Icons.ChevronRight size={14}/>}{showAdvanced?'Hide':'Show'} other nutrients</button>
            {showAdvanced && NUTRIENT_FIELDS.slice(4).reduce((acc,f,i,arr)=>{
              if (i%2===0) {
                acc.push(<div className="mt-input-row" key={i}>
                  <div className="mt-field"><label className="mt-field-label">{f.label}{f.unit&&` (${f.unit})`}</label><input className="mt-input" type="number" step="any" inputMode="decimal" value={vals[f.key]} onChange={e=>setVals({...vals,[f.key]:e.target.value})}/></div>
                  {arr[i+1] && <div className="mt-field"><label className="mt-field-label">{arr[i+1].label}{arr[i+1].unit&&` (${arr[i+1].unit})`}</label><input className="mt-input" type="number" step="any" inputMode="decimal" value={vals[arr[i+1].key]} onChange={e=>setVals({...vals,[arr[i+1].key]:e.target.value})}/></div>}
                </div>);
              }
              return acc;
            }, [])}
            <button className="mt-btn-primary" onClick={save} disabled={!name.trim()}>Save</button>
          </div>
        </div>
      );
    };

    const MealBuilderSheet = ({ foods, onClose, onSave, onSetDirty, dirtyForm }) => {
      const [name, setName] = React.useState('');
      const [servingDesc, setServingDesc] = React.useState('1 meal');
      const [servingG, setServingG] = React.useState(300);
      const [selected, setSelected] = React.useState([]);
      const [search, setSearch] = React.useState('');
      const [addMode, setAddMode] = React.useState(null);
      const [tempAmount, setTempAmount] = React.useState(1);
      const [tempByGrams, setTempByGrams] = React.useState(false);
      const totals = React.useMemo(()=>{
        const t = {};
        for(const f of NUTRIENT_FIELDS) t[f.key]=0;
        for(const item of selected){
          const mult = item.amountType==='grams' ? item.value/item.food.servingG : item.value;
          const sc = scale(item.food, mult);
          for(const f of NUTRIENT_FIELDS) if(sc[f.key]!=null) t[f.key]+=sc[f.key];
        }
        return t;
      },[selected]);
      const handleAddFood = (food) => { setAddMode(food); setTempByGrams(false); setTempAmount(1); };
      const confirmAdd = () => {
        if(addMode){
          setSelected([...selected, { foodId: addMode.id, food: addMode, amountType: tempByGrams?'grams':'servings', value: parseFloat(tempAmount) }]);
          setAddMode(null);
          onSetDirty(true);
        }
      };
      const removeFood = idx => { setSelected(selected.filter((_,i)=>i!==idx)); onSetDirty(true); };
      const handleSave = () => {
        if(!name.trim()) return;
        const meal = { name: name.trim(), servingDesc, servingG: parseFloat(servingG)||300, ...totals };
        onSave(meal);
      };
      return (
        <div className="mt-sheet-bg" onClick={()=>{if(!dirtyForm||confirm('Discard draft?'))onClose();}}><div className="mt-sheet" onClick={e=>e.stopPropagation()}>
          <div className="mt-sheet-head"><h2 className="mt-sheet-title">Create Meal</h2><button className="mt-sheet-x" onClick={onClose}><Icons.X size={20}/></button></div>
          <div className="mt-field"><label className="mt-field-label">Name</label><input className="mt-input" value={name} onChange={e=>{setName(e.target.value); onSetDirty(true);}} placeholder="e.g. Breakfast Bowl"/></div>
          <div className="mt-input-row">
            <div className="mt-field"><label className="mt-field-label">Serving desc</label><input className="mt-input" value={servingDesc} onChange={e=>{setServingDesc(e.target.value); onSetDirty(true);}}/></div>
            <div className="mt-field"><label className="mt-field-label">Grams</label><input className="mt-input" type="number" step="any" value={servingG} onChange={e=>{setServingG(e.target.value); onSetDirty(true);}}/></div>
          </div>
          {selected.length>0 && (
            <div className="mt-goal-card" style={{marginBottom:10}}>
              <h3 className="mt-goal-card-title">Ingredients</h3>
              {selected.map((it,idx)=>(
                <div key={idx} className="mt-meal-builder-item">
                  <span>{it.food.name} — {it.value} {it.amountType==='grams'?'g':'servings'}</span>
                  <button className="mt-meal-builder-remove" onClick={()=>removeFood(idx)}><Icons.X size={14}/></button>
                </div>
              ))}
              <div style={{marginTop:8,fontWeight:600}}>Totals: {Math.round(totals.cal)} cal, {Math.round(totals.protein)}g p, {Math.round(totals.carbs)}g c, {Math.round(totals.fat)}g f</div>
            </div>
          )}
          {!addMode && (
            <>
              <div className="mt-search"><Icons.Search className="mt-search-icon" size={16}/><input className="mt-search-input" placeholder="Search foods…" value={search} onChange={e=>setSearch(e.target.value)}/></div>
              <div style={{maxHeight:'30vh',overflowY:'auto'}}>
                {foods.filter(f=>f.name.toLowerCase().includes(search.toLowerCase())).slice(0,10).map(f=>(
                  <div key={f.id} className="mt-lib-item" onClick={()=>handleAddFood(f)} style={{cursor:'pointer'}}>
                    <div className="mt-lib-info"><p className="mt-lib-name">{f.name}</p><p className="mt-lib-meta">{f.servingDesc} · {fmtInt(f.cal)} cal</p></div>
                    <Icons.Plus size={16}/>
                  </div>
                ))}
              </div>
            </>
          )}
          {addMode && (
            <div className="mt-goal-card">
              <p>{addMode.name} ({addMode.servingDesc})</p>
              <div className="mt-unit-toggle" style={{display:'flex',marginBottom:10}}>
                <button className={!tempByGrams?'active':''} onClick={()=>setTempByGrams(false)} style={{flex:1}}>Servings</button>
                <button className={tempByGrams?'active':''} onClick={()=>setTempByGrams(true)} style={{flex:1}}>Grams</button>
              </div>
              <div className="mt-field">
                <label className="mt-field-label">{tempByGrams?'Grams':'Servings'}</label>
                <input className="mt-input" type="number" step="any" value={tempAmount} onChange={e=>setTempAmount(e.target.value)}/>
              </div>
              <div style={{display:'flex',gap:8}}>
                <button className="mt-btn-secondary" onClick={()=>setAddMode(null)}>Cancel</button>
                <button className="mt-btn-primary" onClick={confirmAdd}>Add</button>
              </div>
            </div>
          )}
          <button className="mt-btn-primary" onClick={handleSave} disabled={selected.length===0||!name.trim()}>Save Meal</button>
        </div></div>
      );
    };

    // ---------- Mount ----------
    const App = () => {
      const [user, setUser] = React.useState(auth.currentUser);
      const [loading, setLoading] = React.useState(true);
      React.useEffect(()=>{ const unsub = auth.onAuthStateChanged(u=>{ setUser(u); setLoading(false); }); return ()=>unsub(); }, []);
      if (loading) return <div style={{padding:40,textAlign:'center',color:'var(--ink-soft)'}}>Loading…</div>;
      if (!user) return <LoginScreen onLogin={u=>setUser(u)}/>;
      return <MainApp user={user} onLogout={()=>auth.signOut()}/>;
    };

    ReactDOM.render(<App />, document.getElementById('root'));
  </script>
</body>
</html>
